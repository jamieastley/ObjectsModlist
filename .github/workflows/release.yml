name: Create Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]*

jobs:
  setup_package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package mod
        run: zip package.zip icon.jpg CHANGELOG.md manifest.json

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: package.zip

  publish_thunderstore:
    name: Publish to Thunderstore
    runs-on: ubuntu-latest
    needs: setup_package
    steps:
      - name: Load secret
        id: load_secrets
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TS_TOKEN: "op://Deployment/Thunderstore - object_Object/credential"

      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: package

      - uses: dhkatz/thunderstore-publish@v1
        id: publish
        with:
          token: ${{ steps.load_secrets.outputs.TS_TOKEN }}
          file: package.zip
          namespace: "object_Object"
          name: "ObjectsModlist"
          description: "A modlist for my dedicated server."
          version: ${{ needs.setup_package.outputs.version }}
          communities: "Valheim"
          categories: |
            Modpacks

      - name: Output URL
        run: echo "Published Thunderstore package to ${{ steps.publish.outputs.url }}"

  create_github_release:
    name: Create GitHub Release
    needs: publish_thunderstore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true