name: Create Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]*

jobs:
  publish_thunderstore:
    name: Publish to Thunderstore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Load secret
        id: load_secrets
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TS_TOKEN: "op://Deployment/Thunderstore - object_Object/credential"

      - uses: dhkatz/thunderstore-publish@v1.0.1
        id: publish
        with:
          token: ${{ steps.load_secrets.outputs.TS_TOKEN }}
          namespace: "object_Object"
          name: "ObjectsModlist"
          description: "A modlist for my dedicated server."
          version: ${{ steps.version.outputs.value }}
          communities: "Valheim"
          categories: |
            Modpacks

      - name: Output URL
        run: echo "Published Thunderstore package to ${{ steps.publish.outputs.url }}"

  create_github_release:
    name: Create GitHub Release
    needs: publish_thunderstore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true